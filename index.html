<!-- File: index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesMetric AI | 営業KPI設計AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>🎯 SalesMetric AI</h1>
    <p>チームの営業目標を入れるだけでKPIを自動設計</p>
  </header>

  <main>
    <!-- STEP1: 共通条件 -->
    <section class="card">
      <h2>STEP 1. 共通条件</h2>
      <div class="grid">
        <label>販売目的
          <select id="purpose">
            <option value="新規開拓">新規顧客開拓</option>
            <option value="既存深耕">既存顧客の深耕</option>
            <option value="シェア拡大">市場シェア拡大</option>
            <option value="新商品投入">新商品の市場投入</option>
          </select>
        </label>

        <label>期間
          <select id="period">
            <option value="1ヶ月">1ヶ月</option>
            <option value="四半期" selected>四半期</option>
            <option value="半期">半期</option>
            <option value="1年">1年</option>
          </select>
        </label>

        <label>指標種別
          <select id="metricType">
            <option value="sales">売上ベース</option>
            <option value="gross">粗利ベース</option>
          </select>
        </label>
      </div>
    </section>

    <!-- STEP2: 業種別目標 -->
    <section class="card">
      <h2>STEP 2. 業種別目標を入力（複数追加可）</h2>
      <div id="segmentList"></div>
      <button type="button" id="btnAddSegment" class="btn-add">＋ 業種を追加</button>
      <div>
        <button id="btnDesign" class="primary">KPIを設計する</button>
      </div>
    </section>

    <!-- STEP3: 結果 -->
    <section class="card" id="kpiSection" hidden>
      <h2>STEP 3. 分析結果</h2>
      <div id="kpiOutput" class="output"></div>
    </section>

    <!-- STEP4: 実績入力 -->
    <section class="card" id="resultSection" hidden>
      <h2>STEP 4. 実績を入力して評価</h2>
      <div id="resultInputs"></div>
      <button id="btnEvaluate" class="primary">実績を評価する</button>
      <div id="evalOutput" class="output"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesMetric AI | 営業KPI設計AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>🎯 SalesMetric AI</h1>
    <p>営業チームの目標を入れるだけでKPI設計から実績評価まで自動化</p>
  </header>

  <main>
    <!-- STEP1: 入力 -->
    <section class="card">
      <h2>STEP 1. 営業条件を入力</h2>
      <div class="grid">
        <label>営業先
  <select id="industry">
    <option value="" selected>指定無し</option>
    <option value="機械・製造">機械・製造</option>
    <option value="建設・不動産">建設・不動産</option>
    <option value="小売">小売</option>
    <option value="EC・通販">EC・通販</option>
    <option value="官公庁・団体">官公庁・団体</option>
    <option value="飲食・宿泊">飲食・宿泊</option>
    <option value="医療・介護">医療・介護</option>
    <option value="美容・ヘルスケア">美容・ヘルスケア</option>
    <option value="教育・スクール">教育・スクール</option>
    <option value="人材・コンサル">人材・コンサル</option>
    <option value="士業・法律">士業・法律</option>
    <option value="金融・保険">金融・保険</option>
    <option value="物流・運輸">物流・運輸</option>
    <option value="レジャー・エンタメ">レジャー・エンタメ</option>
    <option value="冠婚葬祭">冠婚葬祭</option>
    <option value="IT・情報通信">IT・情報通信</option>
    <option value="生活サービス">生活サービス</option>
    <option value="ペット・ホビー">ペット・ホビー</option>
    <option value="広告・メディア">広告・メディア</option>
    <option value="卸売・商社">卸売・商社</option>
  </select>
</label>

        <label>期間
          <select id="period">
            <option value="1ヶ月">1ヶ月</option>
            <option value="四半期" selected>四半期</option>
            <option value="半期">半期</option>
            <option value="1年">1年</option>
          </select>
        </label>

        <label>指標種別
          <select id="metricType">
            <option value="sales">売上ベース</option>
            <option value="gross">粗利ベース</option>
          </select>
        </label>

       <label><span id="targetLabel">売上目標（円）</span>
  <input type="number" id="target" placeholder="例: 30000000" step="10000" min="0" />
</label>

        <label>営業メンバー人数
          <input type="number" id="members" placeholder="例: 5" />
        </label>

<label><span id="unitLabel">平均顧客単価（円）</span>
  <input type="number" id="unitPrice" placeholder="例: 500000" step="10000" min="0" />
</label>  
      </div>
      <button id="btnDesign" class="primary">KPIを設計する</button>
    </section>

    <section class="card" id="kpiSection" hidden>
      <h2>STEP 2. AIが設計したKPIツリー</h2>
      <div id="kpiOutput" class="output"></div>
    </section>

    <section class="card" id="resultSection" hidden>
      <h2>STEP 3. 実績を入力して評価</h2>
      <div class="grid" id="resultInputs"></div>
      <button id="btnEvaluate" class="primary">実績を評価する</button>
      <div id="evalOutput" class="output"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
